{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đăng nhập – Mobile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body{background:#e0e0e0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0}
    .wrap{max-width:420px;margin:0 auto;padding:16px;min-height:100dvh;display:flex;flex-direction:column;gap:16px}
    .form-container{background:#fff;color:#243cfd;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,.06),0 10px 15px rgba(0,0,0,.1);padding:20px 22px;display:flex;flex-direction:column;gap:14px}
    .form-container h2{font-size:20px;font-weight:900;margin:0 0 6px}
    input[type="text"],input[type="password"]{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid #3b51f5}
    .btn{width:100%;border:none;border-radius:9999px;padding:12px 16px;font-weight:700}
    .btn-primary{background:#243cfd;color:#fff}
    .messages{list-style:none;margin:0;padding:0}
    .messages li{margin:6px 0;padding:10px;border-radius:8px;background:#fff}
    .messages li.error{border:1px solid #ef4444;color:#b91c1c}
    .messages li.success{border:1px solid #22c55e;color:#15803d}
  </style>
</head>
<body>
  <main class="wrap">
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    <form class="form-container" method="POST" action="{% url 'login' %}">
      {% csrf_token %}
      <h2>Đăng nhập</h2>

      <input type="text" name="username" placeholder="Tên đăng nhập" 
             value="{{ form.username.value|default_if_none:'' }}" required />

      <input type="password" name="password" placeholder="Mật khẩu" required />

      <button type="submit" class="btn btn-primary">Đăng nhập</button>
    </form>
  </main>
</body>
</html>

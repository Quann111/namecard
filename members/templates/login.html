{% extends "master.html" %}

{% block title %}Đăng nhập{% endblock %}

{% block content %}
<h1>Đăng nhập</h1>

<!-- Hiển thị thông báo -->
{% if messages %}
  <ul class="messages">
    {% for message in messages %}
      <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>
        {{ message }}
      </li>
    {% endfor %}
  </ul>
{% endif %}

<form method="POST">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Đăng nhập</button>
</form>

<p>Chưa có tài khoản? <a href="{% url 'register' %}">Đăng ký</a></p>
{% endblock %}

<style>
  /* ===== Navigation Bar ===== */
  .nav-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex; /* dùng flex cho canh giữa */
    justify-content: center; /* luôn canh giữa */
    align-items: center;
    gap: 6px; /* khoảng cách giữa nút */
    padding: 6px;
    background: transparent;
    z-index: 1000;
    flex-wrap: wrap; /* phòng khi nhỏ màn hình */
  }

  .nav-bar .nav-button {
    display: inline-block;
    min-width: 70px; /* nút không quá bé */
    padding: 10px 16px;
    font-size: 10px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    text-transform: uppercase;
    text-align: center;
    background: #b29f91;
    color: #fff;
    text-decoration: none;
    transition: all 0.2s ease;
  }

  .nav-bar .nav-button:not([disabled]):hover {
    background: #c3773c;
    color: #fff;
    transform: translateY(-2px);
  }

  .nav-bar .nav-button.active {
    background: #c3773c;
    color: #fff;
  }

  .nav-bar .nav-button[disabled] {
    background: #b29f91;
    color: #eee;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* Mobile responsive */
  @media (max-width: 600px) {
    .nav-bar {
      gap: 4px;
    }
    .nav-bar .nav-button {
      flex: 1; /* nút tự giãn đều chiều ngang */
      min-width: unset;
      font-size: 9px;
      padding: 8px 10px;
    }
  }
</style>
{% with p=profile %}
<div class="nav-bar">
  <!-- Trang Chủ -->
  {% if not p or p.show_home %}
  <a
    href="{% if current_id %}{% url 'details' current_id %}{% else %}{% url 'members' %}{% endif %}"
    class="nav-button {% if '/members/' in request.path and not '/products/' in request.path and not '/edit/' in request.path %}active{% endif %}"
  >
    Trang Chủ
  </a>
  {% endif %}

  <!-- Giới Thiệu -->
  {% if not p or p.show_intro %}
  <a
    href="{% url 'template_intro' %}"
    class="nav-button {% if request.path == '/intro/' %}active{% endif %}"
  >
    Giới Thiệu
  </a>
  {% endif %}

  <!-- Sản Phẩm -->
  {% if not p or p.show_products %}
  <a
    href="{% if current_id %}{% url 'template_product' current_id %}{% else %}{% url 'members' %}{% endif %}"
    class="nav-button {% if '/products/' in request.path %}active{% endif %}"
  >
    Sản Phẩm
  </a>
  {% endif %}

  <!-- Đăng Nhập -->
  {% if not p or p.show_auth %}
  <a
    href="{% url 'auth_tabs' %}"
    class="nav-button {% if request.path == '/auth/' %}active{% endif %}"
  >
    Đăng Nhập
  </a>
  {% endif %}
</div>
{% endwith %}
